# Testing Workflow

name: Example

on:
  push:
    branches: [ testing ]

jobs:
  example:
    runs-on: ubuntu-latest
    # Build Project
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env: 
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
