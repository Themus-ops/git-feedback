name: EX2

on:
  push:
    branches: [main]

jobs:
  example:
    runs-on: ubuntu-latest
    steps:
      - name: print
        run: echo "hello World"

      - name: verify_secret
        run: |
          if [ -z "$ENCRYPTION_KEY" ]; then
            echo "Error: ENCRYPTION_KEY is not set in secrets."
            exit 1
          fi
          echo "Secret is present and safe to use (it will appear as *** in logs)."
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        
